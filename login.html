<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulasi E-Wallet - Multi User System</title>
  <style>
    body {
      background-color: #0b0c10;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      flex-direction: column;
    }
    .wallet-card {
      background-color: #1f2833;
      border: 2px solid #66fcf1;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    /* BACKGROUND BLUR POP-UP (OVERLAY) */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(11, 12, 16, 0.85);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
      z-index: 999;
    }

    /* KETIKA POP-UP AKTIF */
    .popup-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* KOTAK FORM POP-UP */
    .popup-box {
      background-color: #1f2833;
      border: 2px solid #66fcf1;
      border-radius: 16px;
      width: 90%;
      max-width: 350px;
      padding: 25px;
      box-shadow: 0 0 25px rgba(102, 252, 241, 0.3);
      position: relative;
      transform: scale(0.8);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .popup-overlay.show .popup-box {
      transform: scale(1);
    }

    .close-btn {
      position: absolute;
      top: 12px; right: 15px;
      color: #c5c6c7;
      font-size: 1.4rem;
      cursor: pointer;
      background: none;
      border: none;
    }
    .close-btn:hover { color: #ff4d4d; }

    .form-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #ffffff;
      text-align: left;
    }

    /* STYLE ATRIBUT INPUT */
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      color: #66fcf1;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 15px;
      background-color: #0b0c10;
      border: 1px solid rgba(102, 252, 241, 0.3);
      border-radius: 8px;
      color: white;
      outline: none;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: #66fcf1;
    }

    .btn-main {
      width: 100%;
      background-color: #66fcf1;
      color: #0b0c10;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 10px;
      transition: all 0.3s;
    }
    .btn-main:hover {
      background-color: #45f3ff;
      box-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
    }

    .switch-form-text {
      font-size: 0.8rem;
      color: #c5c6c7;
      margin-top: 15px;
    }

    .switch-form-text span {
      color: #45f3ff;
      cursor: pointer;
      text-decoration: underline;
      font-weight: bold;
    }
    
    .sim-alert {
      font-size: 0.7rem;
      color: #ff4d4d;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="wallet-card">
    <h2 style="color: #66fcf1; margin-bottom: 10px;">Studio Gateway</h2>
    <p style="color: #c5c6c7; font-size: 0.9rem; margin-bottom: 25px;">Silakan masuk ke akun simulasi Anda untuk mengakses Layanan Dompet Virtual.</p>
    
    <button class="btn-main" id="bukaPopupBtn">Masuk / Daftar Akun</button>
    
    <div class="sim-alert">⚠️ Mode Simulasi: Seluruh database di Local Storage akan otomatis terhapus setiap 2 menit sekali.</div>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <button class="close-btn" id="tutupPopupBtn">&times;</button>
      
      <div class="form-title" id="judulForm">Masuk Akun</div>
      
      <div class="input-group">
        <label for="inputEmail">ALAMAT EMAIL</label>
        <input type="email" id="inputEmail" placeholder="contoh@domain.com">
      </div>

      <div class="input-group">
        <label for="inputPassword">PASSWORD</label>
        <input type="password" id="inputPassword" placeholder="••••••••">
      </div>

      <button class="btn-main" id="submitFormBtn">Masuk</button>

      <div class="switch-form-text">
        <span id="labelPanduan">Belum punya akun? </span><span id="linkTukarForm">Daftar Sekarang</span>
      </div>
    </div>
  </div>

  <script>
    const popupOverlay = document.getElementById('popupOverlay');
    const bukaPopupBtn = document.getElementById('bukaPopupBtn');
    const tutupPopupBtn = document.getElementById('tutupPopupBtn');
    
    const judulForm = document.getElementById('judulForm');
    const inputEmail = document.getElementById('inputEmail');
    const inputPassword = document.getElementById('inputPassword');
    const submitFormBtn = document.getElementById('submitFormBtn');
    const labelPanduan = document.getElementById('labelPanduan');
    const linkTukarForm = document.getElementById('linkTukarForm');

    // Status: true = form login, false = form registrasi
    let isModeLogin = true;

    // 1. KONTROL POP-UP (BUKA & TUTUP)
    bukaPopupBtn.addEventListener('click', () => popupOverlay.classList.add('show'));
    tutupPopupBtn.addEventListener('click', () => popupOverlay.classList.remove('show'));

    popupOverlay.addEventListener('click', (e) => {
      if(e.target === popupOverlay) popupOverlay.classList.remove('show');
    });

    // SYSTEM LOGGER: Fungsi pengirim riwayat ke admin.html
    function catatAktivitasSistem(namaUser, jenisAksi, detailPesan) {
      let logLokal = JSON.parse(localStorage.getItem('db_log_simulasi')) || [];
      const waktuSekarang = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
      
      const dataLogBaru = {
        waktu: waktuSekarang,
        user: namaUser,
        aksi: jenisAksi,
        detail: detailPesan
      };
      
      logLokal.push(dataLogBaru);
      localStorage.setItem('db_log_simulasi', JSON.stringify(logLokal));
    }

    // 2. LOGIKA UTAMA TUKAR FORM (ANTI-GAGAL)
    linkTukarForm.addEventListener('click', () => {
      isModeLogin = !isModeLogin;
      inputEmail.value = "";
      inputPassword.value = "";

      if (isModeLogin) {
        judulForm.textContent = "Masuk Akun";
        submitFormBtn.textContent = "Masuk";
        labelPanduan.textContent = "Belum punya akun? ";
        linkTukarForm.textContent = "Daftar Sekarang";
      } else {
        judulForm.textContent = "Registrasi Akun Baru";
        submitFormBtn.textContent = "Daftar Akun";
        labelPanduan.textContent = "Sudah punya akun? ";
        linkTukarForm.textContent = "Login Di Sini";
      }
    });

    // 3. PROSES DATA REGISTRASI & LOGIN KE LOCALSTORAGE
    submitFormBtn.addEventListener('click', () => {
      const email = inputEmail.value.trim().toLowerCase();
      const password = inputPassword.value.trim();

      if(email === "" || password === "") {
        alert("Gagal: Email dan Password tidak boleh kosong!");
        return;
      }

      let databaseUser = JSON.parse(localStorage.getItem('db_simulasi_user')) || {};

      if (!isModeLogin) {
        // --- PROSES DAFTAR ---
        if(databaseUser[email]) {
          alert("Gagal: Email ini sudah terdaftar!");
        } else {
          databaseUser[email] = password;
          localStorage.setItem('db_simulasi_user', JSON.stringify(databaseUser));
          
          // KIRIM LOG KE ADMIN
          catatAktivitasSistem(email.split('@')[0], "REGISTRASI", `Berhasil membuat akun baru dengan email: ${email}`);
          
          alert("Registrasi Sukses! Silakan pencet 'Login Di Sini' untuk masuk.");
          linkTukarForm.click(); // Balikin tampilan ke login
        }
      } else {
        // --- PROSES LOGIN ---
        if(databaseUser[email] && databaseUser[email] === password) {
          const usernameId = email.split('@')[0]; // Nama depan email jadi username
          localStorage.setItem('userAktif', usernameId);
          
          // KIRIM LOG KE ADMIN
          catatAktivitasSistem(usernameId, "LOGIN", "User berhasil masuk ke dashboard dompet.");
          
          alert(`Login Berhasil! Selamat datang ${usernameId}.`);
          window.location.href = 'index.html'; // Pindah ke halaman dompet virtual lu
        } else {
          alert("Gagal: Akun tidak ditemukan atau password salah!");
        }
      }
    });

    // 4. AUTO-RESET SIKLUS 2 MENIT
    setInterval(() => {
      localStorage.clear(); 
      console.log("Sistem Log: Local Storage di-wipe otomatis.");
      inputEmail.value = "";
      inputPassword.value = "";
    }, 120000);
  </script>

</body>
</html>
