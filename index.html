<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllBot - Chatbot Web</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="js/animation.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/app.js"></script>
    <script src="js/statusHandler.js"></script>
    
</head>
<body>

    <div class="chat-container" id="chatContainer">
        
        <div class="chat-header">
            <div class="bot-info">
                <img src="asset/logo.png" alt="Bot Avatar" class="bot-avatar" onerror="this.src='https://via.placeholder.com/40'">
                <div>
                    <h3>AllBot</h3>
                    <span class="status online bot-status-text">Online</span>
                </div>
            </div>
            <div class="header-actions">
             
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                
            </div>
        </div>

        <div id="bot-options-container"></div>

</body>
</html>
