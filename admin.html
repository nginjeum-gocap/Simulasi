<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Console - Log Data & Transaksi</title>
  <style>
    body {
      background-color: #0b0c10;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background-color: #1f2833;
      border: 2px solid #66fcf1;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
    }
    h2, h3 {
      color: #66fcf1;
      margin-top: 0;
    }
    h2 {
      border-bottom: 2px solid #66fcf1;
      padding-bottom: 10px;
    }
    h3 {
      margin-top: 30px;
      color: #45f3ff;
      border-left: 4px solid #45f3ff;
      padding-left: 10px;
    }
    .btn-danger {
      background-color: #ff4d4d;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-danger:hover { background-color: #cc0000; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background-color: rgba(0,0,0,0.2);
    }
    th, td {
      border: 1px solid rgba(102, 252, 241, 0.2);
      padding: 12px;
      text-align: left;
      font-size: 0.9rem;
    }
    th {
      background-color: rgba(102, 252, 241, 0.1);
      color: #66fcf1;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .badge-reg { background-color: #28a745; color: white; }
    .badge-login { background-color: #007bff; color: white; }
    .badge-topup { background-color: #17a2b8; color: white; }
    .badge-belanja { background-color: #dc3545; color: white; }
    
    .empty-text {
      color: #c5c6c7;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🛠️ Master Developer Console</h2>
    <p>Pantau data akun, aktivitas login, serta riwayat transaksi finansial secara real-time.</p>
    <button class="btn-danger" id="btnClearLogs">Wipe Out Semua Database</button>

    <h3>1. Database Akun Terdaftar</h3>
    <table>
      <thead>
        <tr>
          <th>Email Pengguna</th>
          <th>Password Unik</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>

    <h3>2. Log Transaksi & Sesi Login (Real-time)</h3>
    <table>
      <thead>
        <tr>
          <th style="width: 25%;">Waktu Kejadian (WIB)</th>
          <th style="width: 20%;">ID / Username</th>
          <th style="width: 15%;">Jenis Aksi</th>
          <th style="width: 40%;">Detail Aktivitas</th>
        </tr>
      </thead>
      <tbody id="logTableBody"></tbody>
    </table>
  </div>

  <script>
    const userTableBody = document.getElementById('userTableBody');
    const logTableBody = document.getElementById('logTableBody');
    const btnClearLogs = document.getElementById('btnClearLogs');

    function renderMasterData() {
      // Clear isi tabel lama
      userTableBody.innerHTML = "";
      logTableBody.innerHTML = "";

      // 1. AMBIL & RENDER DATA USER REGISTER
      const dbUser = JSON.parse(localStorage.getItem('db_simulasi_user')) || {};
      const daftarEmail = Object.keys(dbUser);

      if (daftarEmail.length === 0) {
        userTableBody.innerHTML = `<tr><td colspan="2" class="empty-text">Belum ada user yang registrasi.</td></tr>`;
      } else {
        daftarEmail.forEach(email => {
          const row = document.createElement('tr');
          row.innerHTML = `<td><strong>${email}</strong></td><td><code>${dbUser[email]}</code></td>`;
          userTableBody.appendChild(row);
        });
      }

      // 2. AMBIL & RENDER LOG AKTIVITAS & TRANSAKSI JAM
      const listLog = JSON.parse(localStorage.getItem('db_log_simulasi')) || [];

      if (listLog.length === 0) {
        logTableBody.innerHTML = `<tr><td colspan="4" class="empty-text">Belum ada aktivitas transaksi atau login terekam.</td></tr>`;
      } else {
        // Balik urutan listLog biar data yang paling baru muncul di paling atas (.reverse)
        [...listLog].reverse().forEach(log => {
          let badgeClass = "badge-reg";
          if (log.aksi === "LOGIN") badgeClass = "badge-login";
          if (log.aksi === "TOP UP") badgeClass = "badge-topup";
          if (log.aksi === "BELANJA") badgeClass = "badge-belanja";

          const row = document.createElement('tr');
          row.innerHTML = `
            <td style="color: #c5c6c7;">${log.waktu}</td>
            <td style="color: #66fcf1; font-weight:bold;">@${log.user}</td>
            <td><span class="badge ${badgeClass}">${log.aksi}</span></td>
            <td>${log.detail}</td>
          `;
          logTableBody.appendChild(row);
        });
      }
    }

    // Fungsi menghapus semua data simulasi
    btnClearLogs.addEventListener('click', () => {
      if (confirm("Wipe out semua log transaksi dan data user?")) {
        localStorage.clear();
        renderMasterData();
      }
    });

    // Jalankan render data saat halaman dibuka
    renderMasterData();
  </script>

</body>
  </html>
